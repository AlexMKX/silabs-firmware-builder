name: SMLIGHT SLZB-MR3 Large Network Zigbee NCP (Optimized for 176+ devices)
device: EFR32MG24A020F1024IM40
base_project: src/zigbee_ncp
filename: "{manifest_name}_{ezsp_version}_{baudrate}_{fw_variant}"
sdk: "simplicity_sdk:2025.6.2"
toolchain: "12.2.1.20221205"

gbl:
  fw_type: zigbee_ncp
  ezsp_version: dynamic
  baudrate: 115200
  fw_variant: sw_flow


# Custom configuration for large networks (176+ devices)
# Based on SLZB-06MG24 with Silicon Labs recommendations for dense networks
# See: https://community.silabs.com/s/article/guidelines-for-large-dense-networks-with-emberznet-pro
# https://docs.silabs.com/zigbee/8.2.1/zigbee-stack-api/configuration#sl-zigbee-fragment-max-window-size
# slcp_defines:
#   # SL_ZIGBEE_MULTICAST_TABLE_SIZE: 26
#   SL_ZIGBEE_ROUTE_TABLE_SIZE: 200           # Increased from 16 to 200 (CRITICAL!)
#   SL_ZIGBEE_DISCOVERY_TABLE_SIZE: 16        # Increased from 16 to 32

# end custom configuration

c_defines:
  SL_IOSTREAM_EUSART_VCOM_BAUDRATE: 115200
  SL_IOSTREAM_EUSART_VCOM_FLOW_CONTROL_TYPE: SL_IOSTREAM_EUSART_UART_FLOW_CTRL_SOFT

  SL_IOSTREAM_EUSART_VCOM_PERIPHERAL: EUSART0
  SL_IOSTREAM_EUSART_VCOM_PERIPHERAL_NO: 0

  SL_IOSTREAM_EUSART_VCOM_TX_PORT: SL_GPIO_PORT_A
  SL_IOSTREAM_EUSART_VCOM_TX_PIN: 5

  SL_IOSTREAM_EUSART_VCOM_RX_PORT: SL_GPIO_PORT_A
  SL_IOSTREAM_EUSART_VCOM_RX_PIN: 6

  SL_IOSTREAM_EUSART_VCOM_CTS_PORT: 0
  SL_IOSTREAM_EUSART_VCOM_CTS_PIN: 0

  SL_IOSTREAM_EUSART_VCOM_RTS_PORT: 0
  SL_IOSTREAM_EUSART_VCOM_RTS_PIN: 0

  SL_CLOCK_MANAGER_HFXO_EN: 1
  SL_CLOCK_MANAGER_HFXO_CTUNE: 140
  SL_CLOCK_MANAGER_DEFAULT_HF_CLOCK_SOURCE: SL_CLOCK_MANAGER_DEFAULT_HF_CLOCK_SOURCE_HFXO

  SL_RAIL_UTIL_RSSI_OFFSET: 0

# Custom configuration for large networks (176+ devices)
# Based on SLZB-06MG24 with Silicon Labs recommendations for dense networks
# See: https://community.silabs.com/s/article/guidelines-for-large-dense-networks-with-emberznet-pro
# https://docs.silabs.com/zigbee/8.2.1/zigbee-stack-api/configuration#sl-zigbee-fragment-max-window-size
  # SL_ZIGBEE_APS_UNICAST_MESSAGE_COUNT: 128  # MAX for large networks (was 128)
  # SL_ZIGBEE_BROADCAST_TABLE_SIZE: 50        # Increased from 30 to 50 (SiLabs recommendation)
  # SL_ZIGBEE_NEIGHBOR_TABLE_SIZE: 26         # MAX allowed by SDK (1, 16, or 26)
  # SL_ZIGBEE_MAX_END_DEVICE_CHILDREN: 64     # MAX for large networks
  # SL_ZIGBEE_BINDING_TABLE_SIZE: 255         # MAX for 200 devices (was 32)
  # SL_ZIGBEE_ADDRESS_TABLE_SIZE: 200         # Increased from 64 to 200
  # SL_ZIGBEE_APS_DUPLICATE_REJECTION_MAX_ENTRIES: 64
  # SL_ZIGBEE_KEY_TABLE_SIZE: 1
  SL_ZIGBEE_ROUTE_TABLE_SIZE: 100

