name: My builds

# Manual-only trigger. Pre-commit is skipped intentionally — this is a
# personal curated build, not a gate for the main tree.
on:
  workflow_dispatch:
    inputs:
      debug:
        type: boolean
        description: "Output build data to artifacts"
        required: false
      publish_release:
        type: boolean
        description: "Publish GBLs to a GitHub Release"
        required: false
        default: true

env:
  REGISTRY: ghcr.io

jobs:
  check-container:
    name: Check if container build needed
    runs-on: ubuntu-latest
    permissions:
      packages: write
    outputs:
      tag_name: ${{ steps.read-repo-info.outputs.tag_name }}
      image_name: ${{ steps.read-repo-info.outputs.image_name }}
      container_name: ${{ steps.read-repo-info.outputs.container_name }}
      build_image: ${{ steps.read-repo-info.outputs.build_image }}
    steps:
      - uses: actions/checkout@v6
      - name: Log in to the GitHub container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Read repository information
        id: read-repo-info
        run: |
          base_image=$(echo ${{ github.repository }} | awk '{print tolower($0)}')
          head_image=$(echo ${{ github.repository }} | awk '{print tolower($0)}')

          tag_name=$(echo "${{ hashFiles('Dockerfile', 'requirements.txt') }}" | cut -c-16)

          # Default to building a new container under this repo
          image_name=$head_image
          build_image=true

          if docker manifest inspect ${{ env.REGISTRY }}/$base_image:$tag_name; then
            image_name=$base_image
            build_image=false
          fi

          echo "build_image=$build_image" >> $GITHUB_OUTPUT
          echo "tag_name=$tag_name" >> $GITHUB_OUTPUT
          echo "image_name=$image_name" >> $GITHUB_OUTPUT
          echo "container_name=${{ env.REGISTRY }}/$image_name:$tag_name" >> $GITHUB_OUTPUT

  build-container:
    name: Build container
    needs: [check-container]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6
        if: needs.check-container.outputs.build_image == 'true'
      - name: Log in to the GitHub container registry
        if: needs.check-container.outputs.build_image == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        if: needs.check-container.outputs.build_image == 'true'
        uses: docker/setup-buildx-action@v4
      - name: Free up disk space
        if: needs.check-container.outputs.build_image == 'true'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h
      - name: Build and Push
        if: needs.check-container.outputs.build_image == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          tags: ${{ needs.check-container.outputs.container_name }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ needs.check-container.outputs.image_name }}:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ needs.check-container.outputs.image_name }}:cache,mode=max
          push: true

  list-manifests:
    name: List curated firmware manifests
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          # Add/remove firmware paths here — one per line.
          manifests=$(cat <<'EOF'
          manifests/sonoff/sonoff_zbdonglee_dense_zigbee_router.yaml
          EOF
          )
          echo "matrix=$(echo "$manifests" | sed '/^[[:space:]]*$/d' | sed 's/^[[:space:]]*//' | jq -R -s -c 'split("\n")[:-1]')" >> $GITHUB_OUTPUT

  build-firmwares:
    name: Firmware builder
    needs: [list-manifests, check-container, build-container]
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.check-container.outputs.container_name }}
      options: --user root
    permissions:
      contents: write
    strategy:
      matrix:
        manifest: ${{ fromJson(needs.list-manifests.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Build firmware
        id: build-firmware
        run: |
          # Fix `fatal: detected dubious ownership in repository at`
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          /opt/venv/bin/python3 tools/build_project.py \
            --manifest "${{ matrix.manifest }}" \
            --build-dir build \
            --output-dir outputs \
            --output gbl \
            --output hex \
            --output out \
            --repo-owner "$GITHUB_REPOSITORY_OWNER" \
            --repo-hash $(git rev-parse --short=8 "$GITHUB_SHA")

          # Get the basename of the GBL in `outputs`
          output_basename=$(basename -- $(basename -- $(ls -1 outputs/*.gbl | head -n 1)) .gbl)
          echo "output_basename=$output_basename" >> $GITHUB_OUTPUT

          # Derive a stable, per-firmware-version release tag:
          #   output_basename format: {manifest_name}_{sdk_version}_{fw_version}_{baudrate}_{fw_variant}
          #   We want: {manifest_name}-{sdk_version}
          #   Example: sonoff_zbdonglee_dense_zigbee_router_2025.12.3_9.0.2_115200_sw_flow
          #         => sonoff_zbdonglee_dense_zigbee_router-2025.12.3
          #
          # Strategy: manifest stem = filename without .yaml extension.
          # SDK version = the dotted version token that immediately follows the manifest stem in output_basename.
          manifest_stem=$(basename "${{ matrix.manifest }}" .yaml)
          # Strip manifest_stem prefix and leading underscore, then take first field (sdk_version)
          sdk_version=$(echo "$output_basename" | sed "s/^${manifest_stem}_//" | cut -d'_' -f1)
          release_tag="${manifest_stem}-${sdk_version}"
          echo "release_tag=$release_tag" >> $GITHUB_OUTPUT
          echo "release_name=${manifest_stem} ${sdk_version}" >> $GITHUB_OUTPUT

      - name: Install node within container (act)
        if: ${{ env.ACT }}
        run: |
          curl -fsSL https://deb.nodesource.com/nsolid_setup_deb.sh | bash -s 20
          apt-get install -y nodejs

      - uses: actions/upload-artifact@v7
        if: ${{ inputs.debug }}
        with:
          name: build_dir_${{ steps.build-firmware.outputs.output_basename }}
          path: build/*
          compression-level: 9
          include-hidden-files: true

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: firmware-build-${{ steps.build-firmware.outputs.output_basename }}
          path: outputs/*
          compression-level: 9
          if-no-files-found: error

      # Publish GBL to a per-firmware-version release.
      # Tag format: {manifest_name}-{sdk_version}  e.g. sonoff_zbdonglee_dense_zigbee_router-2025.12.3
      #
      # softprops/action-gh-release@v3 is IDEMPOTENT on existing tags:
      #   - If the tag/release already exists it UPDATES the release body and
      #     re-uploads (overwrites) any asset with the same filename.
      #   - Re-running the workflow for the same firmware version therefore
      #     overwrites the previous GBL in the same release — no conflict.
      - name: Publish release
        # inputs.publish_release is a boolean workflow_dispatch input.
        # When left at its default (true) GitHub Actions passes the string "true".
        # When explicitly set to false it passes "false".
        # We skip only when the string value is literally "false".
        if: ${{ inputs.publish_release != false }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.build-firmware.outputs.release_tag }}
          name: ${{ steps.build-firmware.outputs.release_name }}
          fail_on_unmatched_files: true
          files: outputs/*.gbl
